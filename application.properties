# ─────────────────────────────────────────────
#  LiterAlura – application.properties
# ─────────────────────────────────────────────

# Server
server.port=8080

# DataSource ── MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/literalura_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=tu_password_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# Gutendex base URL (configurable sin tocar código)
gutendex.api.url=https://gutendex.com/books/
